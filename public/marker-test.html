<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marker Test Hiro</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #10213b;
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 28px;
        box-sizing: border-box;
      }
      .card {
        width: min(900px, 100%);
        border: 1px solid #ccd7e8;
        border-radius: 16px;
        padding: 22px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.55;
      }
      ul {
        margin: 0 0 16px;
        padding-left: 20px;
        line-height: 1.6;
      }
      .marker-wrap {
        padding: 22px;
        border: 1px dashed #90a9c8;
        border-radius: 12px;
        background: #ffffff;
        display: grid;
        place-items: center;
      }
      img {
        width: min(560px, 94%);
        max-width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hiro Marker Test</h1>
      <p>Gunakan halaman ini untuk menyiapkan marker sebelum scan di mode AR.</p>
      <ul>
        <li>Gunakan kamera belakang.</li>
        <li>Jarak ideal marker ke kamera: 30-60 cm.</li>
        <li>Pastikan seluruh kotak marker masuk frame kamera.</li>
      </ul>
      <div class="marker-wrap">
        <img src="/assets/markers/hiro.png" alt="Hiro marker" />
      </div>
    </div>
  </body>
</html>
